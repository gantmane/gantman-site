      .tag { font-family: 'DM Mono', monospace; font-size: 18px; fill: #c8441a; letter-spacing: 4px; }
      .h1 { font-family: 'DM Serif Display', Georgia, serif; font-size: 90px; fill: #f5f2ed; line-height: 1; }
      .h1-em { fill: #c8441a; font-style: italic; }
      .sub { font-family: 'DM Sans', sans-serif; font-size: 28px; fill: rgba(245,242,237,0.75); }
